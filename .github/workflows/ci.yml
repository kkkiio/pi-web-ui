name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  web-ui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: |
          npx tsc --noEmit
          npm run check

      - name: Build
        run: npm run build:web

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run real Pi E2E
        run: npm run e2e
